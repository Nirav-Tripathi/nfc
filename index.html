<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nirav Tripathi</title>

  <meta name="theme-color" content="#000000">
</head>

<body style="margin:0; font-family:Arial, sans-serif; background:#0f0f0f; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="text-align:center; max-width:320px;">

    <img src="photo.jpeg" style="width:120px; height:120px; border-radius:50%; object-fit:cover; margin-bottom:15px;">

    <h1 style="margin:10px 0;">Nirav Tripathi</h1>

    <p style="opacity:0.8; margin-bottom:25px;">
      Tap to save contact instantly
    </p>

    <a href="niravtripathi.vcf"
       style="display:inline-block; padding:15px 20px; background:white; color:black; text-decoration:none; border-radius:12px; font-weight:bold;">
      📇 Save Contact
    </a>

  </div>

  <!-- Auto-trigger download for NFC taps -->
  <script>
    window.onload = () => {
      const link = document.createElement("a");
      link.href = "niravtripathi.vcf";
      link.download = "niravtripathi.vcf";
      document.body.appendChild(link);
      link.click();
    };
  </script>

</body>
</html>
